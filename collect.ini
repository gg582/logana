; ---------------------------------------------------------
; Production-Ready Log Analytics Configuration (English)
; ---------------------------------------------------------

[global]
case_sensitive = false
fuzzy_threshold = 0.85
max_rows_per_analysis = 2000000
encoding = UTF-8
memory_pool_size_mb = 1024

[streaming_policy]
aggregation_window_ms = 20
min_batch_size_kb = 64
worker_threads = 8
async_render_threads = 4

[field_mapping]
timestamp_keys = ["timestamp", "@timestamp", "ts", "time_local", "event_time"]
numeric_keys = ["latency", "duration", "cpu_usage", "mem_used", "status_code", "bytes_sent"]
category_keys = ["method", "level", "service_id", "node_role", "region_az", "client_ip"]

[clustering_strategy]
default_algorithm = "dbscan"
dbscan_eps = 0.45
dbscan_min_samples = 10

[analysis_triggers]
enable_time_series_trend = true
enable_outlier_detection = true
enable_correlation_matrix = true
enable_shannon_entropy = true
enable_linear_regression = true

[visual_presets]
theme = "hyper-dark"
canvas_width = 1440
canvas_height = 500
color_palette = ["#00FF41", "#00E5FF", "#FF0055", "#FFCC00", "#9D00FF"]

[nested_parsing]
paths = ["metadata.context.source_ip", "payload.metrics.temp", "kubernetes.pod.name"]
